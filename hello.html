<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Home - Suprio's Homepage</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 60px 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 600px;
        }
        
        .welcome-header {
            color: #667eea;
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .name {
            color: #764ba2;
            font-size: 56px;
            font-weight: bold;
            margin: 20px 0;
        }
        
        .subtitle {
            color: #555;
            font-size: 18px;
            margin: 20px 0;
            line-height: 1.6;
        }
        
        .message {
            color: #888;
            font-size: 16px;
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px solid #eee;
        }
        
        .emoji {
            font-size: 50px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">👋</div>
        <div class="welcome-header">Welcome Home!</div>
        <div class="name">Suprio</div>
        <div class="subtitle">
            Glad to have you here. This is your personal welcome page.
        </div>
        <div class="message">
            Hope you have a great day ahead! 🌟
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Home - Suprio's Homepage</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at top left, rgba(233, 255, 236, 0.7), transparent 18%),
                        linear-gradient(135deg, #2fa96b 0%, #0f5f34 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #1f3f2b;
        }
        
        .container {
            position: relative;
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 60px 40px;
            border-radius: 18px;
            box-shadow: 0 20px 60px rgba(16, 70, 40, 0.18);
            max-width: 620px;
            overflow: hidden;
        }
        
        .container::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, rgba(255,255,255,0.6) 0%, transparent 55%);
            pointer-events: none;
        }
        
        .welcome-header {
            color: #156a40;
            font-size: 48px;
            font-weight: 800;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        
        .name {
            color: #1f7a4b;
            font-size: 60px;
            font-weight: 900;
            margin: 20px 0;
            text-transform: uppercase;
        }
        
        .subtitle {
            color: #2a3f31;
            font-size: 19px;
            margin: 20px 0;
            line-height: 1.7;
        }
        
        .message {
            color: #3d4d3f;
            font-size: 16px;
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px solid rgba(31, 79, 52, 0.12);
        }
        
        .emoji {
            font-size: 52px;
            margin: 20px 0;
            animation: float 4s ease-in-out infinite;
        }
        
        .action-btn {
            display: inline-block;
            margin-top: 25px;
            padding: 14px 30px;
            background: linear-gradient(135deg, #16c172, #0e7a4d);
            color: #fff;
            border: none;
            border-radius: 999px;
            font-size: 16px;
            font-weight: 700;
            text-decoration: none;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }
        
        .action-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 14px 28px rgba(16, 161, 107, 0.28);
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        @media (max-width: 640px) {
            .container {
                padding: 40px 24px;
            }
            .welcome-header {
                font-size: 38px;
            }
            .name {
                font-size: 46px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">👋</div>
        <div class="welcome-header">Welcome Home,</div>
        <div class="name">Suprio</div>
        <div class="subtitle">
            This is your personal homepage. It has a friendly look, subtle animation, and a clean card layout.
        </div>
        <a class="action-btn" href="#message">View your greeting</a>
        <div class="message" id="message">
            Thanks for visiting! Keep building and enjoy the creative journey. ✨
        </div>
    </div>
</body>
</html>
